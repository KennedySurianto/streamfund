services:
  db:
    image: postgres:15-alpine
    container_name: streamfund_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - streamfund_pgdata:/var/lib/postgresql/data

volumes:
  streamfund_pgdata: